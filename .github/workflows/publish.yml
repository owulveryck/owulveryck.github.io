name: Publish Website

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: live
    env:
      HUGO_VERSION: 0.127.0
    steps:
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Install Hugo CLI
        run: |
          npm install -g postcss-cli && \
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Build Website
        run: hugo -d ./public
      - name: Sync fingerprinted assets (immutable cache)
        run: |
          aws s3 sync ./public "s3://${{ secrets.AWS_S3_BUCKET }}" \
            --acl public-read --follow-symlinks \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" \
            --include "css/style.min.*.css" \
            --include "css/print.min.*.css" \
            --include "js/main.*.js" \
            --include "js/lightbox.min.*.js" \
            --include "js/print-footnotes.min.*.js" \
            --include "fonts/*.woff2"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
      - name: Sync images (1 day cache)
        run: |
          aws s3 sync ./public "s3://${{ secrets.AWS_S3_BUCKET }}" \
            --acl public-read --follow-symlinks \
            --cache-control "public, max-age=86400" \
            --exclude "*" \
            --include "assets/*" \
            --include "content-images/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
      - name: Sync everything else (1 hour cache, delete stale)
        run: |
          aws s3 sync ./public "s3://${{ secrets.AWS_S3_BUCKET }}" \
            --acl public-read --follow-symlinks --delete \
            --cache-control "public, max-age=3600"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
