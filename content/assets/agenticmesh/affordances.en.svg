<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="288px" preserveAspectRatio="none" style="width:1057px;height:288px;background:#FFFFFF;" version="1.1" viewBox="0 0 1057 288" width="1057px" zoomAndPan="magnify"><defs/><g><!--entity agent--><g class="entity" data-qualified-name="agent" data-source-line="6" id="ent0002"><polygon fill="#00D2DD" points="674.4,153,626.16,134,529.68,134,481.44,153,529.68,172,626.16,172,674.4,153" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="49" x="529.6812" y="149.7803">AGENT</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="96.4824" x="529.6812" y="163.7803">AI-as-a-product</text></g><!--entity a1--><g class="entity" data-qualified-name="a1" data-source-line="8" id="ent0003"><rect fill="#DAF6F9" height="48" rx="7" ry="7" style="stroke:#000000;stroke-width:1;" width="139.8408" x="12" y="19"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="65.3652" x="22" y="39.7803">1. Expose</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="119.8408" x="22" y="53.7803">decisions &amp; actions</text></g><!--entity a2--><g class="entity" data-qualified-name="a2" data-source-line="9" id="ent0004"><rect fill="#DAF6F9" height="48" rx="7" ry="7" style="stroke:#000000;stroke-width:1;" width="99.3516" x="187.24" y="19"/><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="79.3516" x="197.24" y="39.7803">2. Consume</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="45.1377" x="197.24" y="53.7803">context</text></g><!--entity a3--><g class="entity" data-qualified-