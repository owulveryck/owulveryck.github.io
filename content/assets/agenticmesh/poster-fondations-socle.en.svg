<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"  viewBox="0 0 420 170">

      <!-- === AGENTIC APPLICATION FRAME === -->
      <rect x="60" y="2" width="300" height="84" rx="10" fill="none" stroke="#00D2DD" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
      <text x="210" y="12" text-anchor="middle" fill="#00D2DD" font-size="6.5" font-weight="700" opacity="0.7">AGENTIC APPLICATION</text>

      <!-- Orchestrator -->
      <rect x="160" y="16" width="100" height="18" rx="8" fill="#0E2356" opacity="0.7"/>
      <text x="210" y="27" text-anchor="middle" fill="white" font-size="7" font-weight="700">Orchestrator</text>
      <text x="210" y="33" text-anchor="middle" fill="#B7BDCC" font-size="4.5">coordinates</text>

      <!-- Orch → Agents -->
      <line x1="180" y1="34" x2="110" y2="50" stroke="#0E2356" stroke-width="1" opacity="0.25"/>
      <line x1="210" y1="34" x2="210" y2="50" stroke="#0E2356" stroke-width="1" opacity="0.25"/>
      <line x1="240" y1="34" x2="310" y2="50" stroke="#0E2356" stroke-width="1" opacity="0.25"/>

      <!-- Agents -->
      <text x="210" y="46" text-anchor="middle" fill="#3E4F78" font-size="5.5">decide and act</text>

      <polygon points="95,58 110,50 125,58 125,74 110,82 95,74" fill="#00D2DD"/>
      <text x="110" y="70" text-anchor="middle" fill="#0E2356" font-size="8" font-weight="700">Ag. A</text>
      <polygon points="195,58 210,50 225,58 225,74 210,82 195,74" fill="#00D2DD"/>
      <text x="210" y="70" text-anchor="middle" fill="#0E2356" font-size="8" font-weight="700">Ag. B</text>
      <polygon points="295,58 310,50 325,58 325,74 310,82 295,74" fill="#00D2DD"/>
      <text x="310" y="70" text-anchor="middle" fill="#0E2356" font-size="8" font-weight="700">Ag. C</text>

      <!-- === TOOLS (interface, outside the frame) === -->
      <line x1="110" y1="82" x2="110" y2="90" stroke="#6E7B9A" stroke-width="1" opacity="0.4"/>
      <line x1="210" y1="82" x2="210" y2="90" stroke="#6E7B9A" stroke-width="1" opacity="0.4"/>
      <line x1="310" y1="82" x2="310" y2="90" stroke="#6E7B9A" stroke-width="1" opacity="0.4"/>

      <rect x="90" y="90" width="40" height="10" rx="2" fill="#6E7B9A"/>
      <text x="110" y="97" text-anchor="middle" fill="white" font-size="5.5" font-weight="600">tools</text>
      <rect x="190" y="90" width="40" height="10" rx="2" fill="#6E7B9A"/>
      <text x="210" y="97" text-anchor="middle" fill="white" font-size="5.5" font-weight="600">tools</text>
      <rect x="290" y="90" width="40" height="10" rx="2" fill="#6E7B9A"/>
      <text x="310" y="97" text-anchor="middle" fill="white" font-size="5.5" font-weight="600">tools</text>

      <!-- Tools → Capabilities -->
      <line x1="110" y1="100" x2="100" y2="108" stroke="#6E7B9A" stroke-width="1" opacity="0.3"/>
      <line x1="210" y1="100" x2="150" y2="108" stroke="#6E7B9A" stroke-width="1" opacity="0.25"/>
      <line x1="210" y1="100" x2="260" y2="108" stroke="#6E7B9A" stroke-width="1" opacity="0.25"/>
      <line x1="310" y1="100" x2="320" y2="108" stroke="#6E7B9A" stroke-width="1" opacity="0.3"/>

      <text x="80" y="106" fill="#0E2356" font-size="7" font-weight="600">reads</text>
      <text x="332" y="106" fill="#0E2356" font-size="7" font-weight="600">writes</text>

      <!-- === EXPOSED CAPABILITIES === -->
      <rect x="40" y="108" width="150" height="22" rx="5" fill="#E7E9EE" stroke="#6E7B9A" stroke-width="1.2"/>
      <text x="115" y="119" text-anchor="middle" fill="#0E2356" font-size="7.5" font-weight="700">READ</text>
      <text x="115" y="127" text-anchor="middle" fill="#3E4F78" font-size="5">Understand · Resources · Context</text>

      <rect x="230" y="108" width="150" height="22" rx="5" fill="#E7E9EE" stroke="#6E7B9A" stroke-width="1.2"/>
      <text x="305" y="119" text-anchor="middle" fill="#0E2356" font-size="7.5" font-weight="700">WRITE</text>
      <text x="305" y="127" text-anchor="middle" fill="#3E4F78" font-size="5">Act · Actions · Modifications</text>

      <!-- Functional decoupling -->
      <text x="210" y="138" text-anchor="middle" fill="#0E2356" font-size="6.5" font-weight="600" font-style="italic">functional decoupling</text>

      <!-- Capabilities → Platform -->
      <line x1="115" y1="130" x2="115" y2="142" stroke="#6E7B9A" stroke-width="1.5" opacity="0.3"/>
      <line x1="305" y1="130" x2="305" y2="142" stroke="#6E7B9A" stroke-width="1.5" opacity="0.3"/>

      <!-- === DIGITAL PLATFORM === -->
      <rect x="30" y="142" width="360" height="18" rx="6" fill="#0E2356" opacity="0.9"/>
      <text x="210" y="153" text-anchor="middle" fill="white" font-size="7.5" font-weight="700">DIGITAL PLATFORM</text>
      <text x="210" y="159" text-anchor="middle" fill="#B7BDCC" font-size="5">Existing IS · APIs · Data · Business services</text>

      <!-- Keyphrase -->
      <text x="210" y="170" text-anchor="middle" fill="#3E4F78" font-size="7" font-style="italic">First, frame the platform. Expose read and write. Then, agents decide.</text>
    </svg>