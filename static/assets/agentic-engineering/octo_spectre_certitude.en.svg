<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Outfit', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D2DD"/>
      <stop offset="35%" stop-color="#00D2DD"/>
      <stop offset="55%" stop-color="#586586"/>
      <stop offset="100%" stop-color="#0E2356"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect x="0" y="0" width="900" height="520" rx="12" fill="#ffffff" stroke="#CFD3DD" stroke-width="1" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#0E2356">Contextual Certainty vs. Systemic Certainty</text>
  <text x="450" y="50" text-anchor="middle" font-size="10" fill="#586586" font-style="italic">Three approaches, three levels of control &#x2014; what changes when you scale</text>

  <!-- ===== THREE COLUMNS ===== -->

  <!-- Column 1: Vibe Coding -->
  <text x="150" y="90" text-anchor="middle" font-size="17" font-weight="bold" fill="#586586">Vibe Coding</text>
  <text x="150" y="110" text-anchor="middle" font-size="10" fill="#586586">Informal prompts</text>
  <text x="150" y="124" text-anchor="middle" font-size="10" fill="#586586">&#171; Looks like it works &#187;</text>
  <text x="150" y="138" text-anchor="middle" font-size="10" fill="#586586">Rapid prototyping</text>

  <line x1="150" y1="150" x2="150" y2="178" stroke="#00D2DD" stroke-width="2"/>

  <!-- Column 2: Structured AI -->
  <text x="450" y="90" text-anchor="middle" font-size="17" font-weight="bold" fill="#263967">Structured AI assistance</text>
  <rect x="395" y="96" width="110" height="18" rx="9" fill="#EBFAFB" stroke="#00D2DD" stroke-width="0.8"/>
  <text x="450" y="109" text-anchor="middle" font-size="9" fill="#263967" font-weight="bold">e.g. BMAD</text>
  <text x="450" y="128" text-anchor="middle" font-size="10" fill="#586586">Detailed prompts + rules + templates</text>
  <text x="450" y="142" text-anchor="middle" font-size="10" fill="#586586">Spot checks, structured code</text>

  <line x1="450" y1="150" x2="450" y2="178" stroke="#586586" stroke-width="2"/>

  <!-- Column 3: Agentic Engineering -->
  <text x="750" y="90" text-anchor="middle" font-size="17" font-weight="bold" fill="#0E2356">Agentic Engineering</text>
  <text x="750" y="110" text-anchor="middle" font-size="10" fill="#586586">Formal specifications + platform</text>
  <text x="750" y="124" text-anchor="middle" font-size="10" fill="#586586">Systemic guardrails + CI/CD</text>
  <text x="750" y="138" text-anchor="middle" font-size="10" fill="#586586">Production at scale</text>

  <line x1="750" y1="150" x2="750" y2="178" stroke="#0E2356" stroke-width="2"/>

  <!-- ===== GRADIENT BAR ===== -->
  <rect x="60" y="182" width="780" height="36" rx="18" fill="url(#spectrumGrad)"/>

  <!-- Axis labels -->
  <text x="60" y="240" text-anchor="start" font-size="10" fill="#586586">&#x2190; Less structure, more speed</text>
  <text x="840" y="240" text-anchor="end" font-size="10" fill="#586586">More structure, more reliability &#x2192;</text>

  <!-- ===== CERTITUDE GAUGES ===== -->

  <!-- Section title -->
  <text x="60" y="278" font-size="12" font-weight="bold" fill="#0E2356">What level of certainty?</text>

  <!-- Row 1: Contextual certainty -->
  <text x="60" y="310" font-size="11" fill="#0E2356" font-weight="600">Contextual certainty</text>
  <text x="60" y="323" font-size="8" fill="#8691AB" font-style="italic">Does this app work well?</text>

  <!-- Gauge Vibe: low -->
  <rect x="260" y="302" width="120" height="14" rx="4" fill="#E7E9EE"/>
  <rect x="260" y="302" width="25" height="14" rx="4" fill="#00D2DD"/>
  <text x="320" y="312" text-anchor="middle" font-size="7" fill="#8691AB">Random</text>

  <!-- Gauge Structured: high -->
  <rect x="430" y="302" width="120" height="14" rx="4" fill="#E7E9EE"/>
  <rect x="430" y="302" width="105" height="14" rx="4" fill="#263967"/>
  <text x="490" y="312" text-anchor="middle" font-size="7" fill="#FFFFFF" font-weight="bold">High</text>

  <!-- Gauge Agentic: high -->
  <rect x="610" y="302" width="120" height="14" rx="4" fill="#E7E9EE"/>
  <rect x="610" y="302" width="110" height="14" rx="4" fill="#0E2356"/>
  <text x="670" y="312" text-anchor="middle" font-size="7" fill="#FFFFFF" font-weight="bold">High</text>

  <!-- Row 2: Systemic certainty -->
  <text x="60" y="362" font-size="11" fill="#0E2356" font-weight="600">Systemic certainty</text>
  <text x="60" y="375" font-size="8" fill="#8691AB" font-style="italic">Are all apps at the same level?</text>

  <!-- Gauge Vibe: none -->
  <rect x="260" y="354" width="120" height="14" rx="4" fill="#E7E9EE"/>
  <rect x="260" y="354" width="5" height="14" rx="4" fill="#00D2DD"/>
  <text x="320" y="364" text-anchor="middle" font-size="7" fill="#8691AB">None</text>

  <!-- Gauge Structured: low -->
  <rect x="430" y="354" width="120" height="14" rx="4" fill="#E7E9EE"/>
  <rect x="430" y="354" width="22" height="14" rx="4" fill="#586586"/>
  <text x="504" y="364" text-anchor="middle" font-size="7" fill="#8691AB">Low</text>

  <!-- Gauge Agentic: high -->
  <rect x="610" y="354" width="120" height="14" rx="4" fill="#E7E9EE"/>
  <rect x="610" y="354" width="110" height="14" rx="4" fill="#0E2356"/>
  <text x="670" y="364" text-anchor="middle" font-size="7" fill="#FFFFFF" font-weight="bold">High</text>

  <!-- ===== CALLOUT BOXES ===== -->

  <!-- Callout BMAD (turquoise border) -->
  <rect x="60" y="400" width="370" height="50" rx="6" fill="#EBFAFB" stroke="#00D2DD" stroke-width="1.2"/>
  <text x="78" y="420" font-size="10" fill="#263967" font-weight="bold">BMAD / Structured AI</text>
  <text x="78" y="436" font-size="9" fill="#586586">A well-built app, following best practices.</text>
  <text x="78" y="448" font-size="9" fill="#586586" font-weight="bold">But the next one starts from scratch.</text>

  <!-- Callout Platform (navy border) -->
  <rect x="470" y="400" width="370" height="50" rx="6" fill="#E7E9EE" stroke="#0E2356" stroke-width="1.5"/>
  <text x="488" y="420" font-size="10" fill="#0E2356" font-weight="bold">Agentic platform</text>
  <text x="488" y="436" font-size="9" fill="#586586">All apps at the same quality level,</text>
  <text x="488" y="448" font-size="9" fill="#0E2356" font-weight="bold">by design, not by individual effort.</text>

  <!-- ===== BOTTOM ANNOTATION ===== -->
  <text x="450" y="490" text-anchor="middle" font-size="11" font-weight="600" fill="#263967">Contextual certainty is necessary but insufficient.</text>
  <text x="450" y="506" text-anchor="middle" font-size="11" font-weight="600" fill="#263967">Only systemic certainty scales.</text>

</svg>