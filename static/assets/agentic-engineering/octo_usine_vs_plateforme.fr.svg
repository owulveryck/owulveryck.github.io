<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Outfit', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#586586"/>
    </marker>
    <marker id="arrowNavy" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0E2356"/>
    </marker>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#586586"/>
    </marker>
    <marker id="arrowDownNavy" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0E2356"/>
    </marker>
    <marker id="arrowTurquoise" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00D2DD"/>
    </marker>
  </defs>

  <!-- Background card -->
  <rect x="0" y="0" width="900" height="560" rx="12" fill="#ffffff" stroke="#CFD3DD" stroke-width="1" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#0E2356">D'o&#249; vient le contexte ? La pi&#232;ce manquante du mod&#232;le usine.</text>
  <text x="450" y="48" text-anchor="middle" font-size="10" fill="#586586" font-style="italic">Le mod&#232;le usine fonctionne &#x2014; mais il ne dit pas qui fournit les entr&#233;es.</text>

  <!-- ===== VERTICAL DASHED DIVIDER ===== -->
  <line x1="450" y1="62" x2="450" y2="500" stroke="#CFD3DD" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ==================== LEFT PANEL: SANS PLATEFORME ==================== -->

  <!-- Header -->
  <g transform="translate(30, 62)">
    <text x="10" y="16" font-size="15" font-weight="bold" fill="#586586">Sans plateforme</text>
    <text x="10" y="31" font-size="9" fill="#8691AB">Chaque projet est un cas isol&#233;</text>

    <!-- Simplified factory -->
    <rect x="10" y="48" width="390" height="180" rx="8" fill="#E7E9EE" stroke="#CFD3DD" stroke-width="1"/>
    <text x="25" y="66" font-size="10" font-weight="bold" fill="#586586">Usine des agents (par projet)</text>

    <!-- Funnel with "?" -->
    <g transform="translate(60,110)">
      <path d="M-16,-16 L16,-16 L5,0 L5,12 L-5,12 L-5,0 Z" fill="none" stroke="#586586" stroke-width="1.5"/>
      <text x="0" y="-2" text-anchor="middle" font-size="14" fill="#00D2DD" font-weight="bold">?</text>
    </g>
    <text x="60" y="140" font-size="8" fill="#586586" text-anchor="middle">Entr&#233;es</text>

    <!-- Arrow to Agent -->
    <line x1="82" y1="110" x2="118" y2="110" stroke="#586586" stroke-width="1" marker-end="url(#arrowGray)"/>

    <!-- Agent planning pill -->
    <rect x="130" y="98" width="80" height="24" rx="12" fill="#586586"/>
    <text x="170" y="114" text-anchor="middle" font-size="8" fill="white">Agent plan.</text>

    <!-- Arrow -->
    <line x1="214" y1="110" x2="238" y2="110" stroke="#586586" stroke-width="1" marker-end="url(#arrowGray)"/>

    <!-- Agent coding pill -->
    <rect x="250" y="98" width="70" height="24" rx="12" fill="#586586"/>
    <text x="285" y="114" text-anchor="middle" font-size="8" fill="white">Agent code</text>

    <!-- Arrow -->
    <line x1="324" y1="110" x2="348" y2="110" stroke="#586586" stroke-width="1" marker-end="url(#arrowGray)"/>

    <!-- Output -->
    <rect x="360" y="100" width="26" height="20" rx="3" fill="white" stroke="#CFD3DD" stroke-width="1"/>
    <text x="373" y="113" text-anchor="middle" font-size="8" fill="#586586">App</text>

    <!-- Guardrails bar &#x2014; dashed, fragile -->
    <rect x="25" y="150" width="362" height="16" rx="3" fill="white" stroke="#00D2DD" stroke-width="0.8" stroke-dasharray="4,3"/>
    <text x="206" y="161" text-anchor="middle" font-size="7.5" fill="#586586" font-style="italic">Garde-fous ? D&#233;finis au cas par cas (ou pas du tout)</text>

    <!-- No shared context indicator -->
    <rect x="25" y="172" width="362" height="16" rx="3" fill="white" stroke="#00D2DD" stroke-width="0.8" stroke-dasharray="4,3"/>
    <text x="206" y="183" text-anchor="middle" font-size="7.5" fill="#586586" font-style="italic">Contexte ? D&#233;pend du d&#233;veloppeur et de son prompt</text>

    <!-- ===== QUESTIONS (unanswered) ===== -->
    <text x="22" y="215" font-size="11" font-weight="bold" fill="#586586">Questions sans r&#233;ponse :</text>

    <text x="28" y="238" font-size="10" fill="#586586">&#x2022;  D'o&#249; viennent les instructions ?</text>
    <text x="370" y="238" font-size="11" fill="#00D2DD">?</text>

    <text x="28" y="258" font-size="10" fill="#586586">&#x2022;  D'o&#249; viennent les garde-fous ?</text>
    <text x="370" y="258" font-size="11" fill="#00D2DD">?</text>

    <text x="28" y="278" font-size="10" fill="#586586">&#x2022;  D'o&#249; viennent les standards ?</text>
    <text x="370" y="278" font-size="11" fill="#00D2DD">?</text>

    <text x="28" y="298" font-size="10" fill="#586586">&#x2022;  D'o&#249; vient le contexte m&#233;tier ?</text>
    <text x="370" y="298" font-size="11" fill="#00D2DD">?</text>

    <!-- N projects, N setups -->
    <g transform="translate(10, 320)">
      <!-- 3 small disconnected factory icons -->
      <rect x="10" y="0" width="90" height="22" rx="3" fill="#E7E9EE" stroke="#CFD3DD" stroke-width="0.8"/>
      <text x="55" y="14" text-anchor="middle" font-size="7" fill="#586586">Projet A</text>

      <rect x="115" y="0" width="90" height="22" rx="3" fill="#E7E9EE" stroke="#CFD3DD" stroke-width="0.8"/>
      <text x="160" y="14" text-anchor="middle" font-size="7" fill="#586586">Projet B</text>

      <rect x="220" y="0" width="90" height="22" rx="3" fill="#E7E9EE" stroke="#CFD3DD" stroke-width="0.8"/>
      <text x="265" y="14" text-anchor="middle" font-size="7" fill="#586586">Projet C</text>

      <text x="340" y="14" font-size="9" fill="#8691AB">...</text>
    </g>

    <text x="100" y="362" font-size="8" fill="#8691AB" font-style="italic">Chacun avec son propre contexte, ses propres r&#232;gles</text>

    <!-- Risk badge -->
    <rect x="10" y="378" width="80" height="24" rx="4" fill="#00D2DD"/>
    <text x="50" y="394" text-anchor="middle" font-size="10" fill="#0E2356" font-weight="bold">Risque</text>
    <text x="100" y="390" font-size="9" fill="#586586" font-style="italic">N projets = N contextes diff&#233;rents.</text>
    <text x="100" y="404" font-size="9" fill="#0E2356" font-weight="bold" font-style="italic">Aucune coh&#233;rence garantie.</text>
  </g>

  <!-- ==================== RIGHT PANEL: AVEC PLATEFORME ==================== -->

  <g transform="translate(460, 62)">
    <!-- Header -->
    <text x="10" y="16" font-size="15" font-weight="bold" fill="#0E2356">Avec plateforme</text>
    <text x="10" y="31" font-size="9" fill="#8691AB">Le contexte est fourni par l'infrastructure</text>

    <!-- Platform block -->
    <rect x="10" y="48" width="400" height="100" rx="8" fill="#0E2356"/>
    <text x="30" y="68" font-size="11" font-weight="bold" fill="white">Plateforme AI-Ready</text>
    <text x="195" y="68" font-size="8" fill="#00D2DD">Capacit&#233;s syst&#233;miques</text>

    <!-- 3 pillars inside platform -->
    <rect x="22" y="80" width="115" height="26" rx="4" fill="#263967"/>
    <text x="79" y="96" text-anchor="middle" font-size="8" fill="#B7BDCC">Contexte syst&#233;mique</text>

    <rect x="147" y="80" width="115" height="26" rx="4" fill="#263967"/>
    <text x="204" y="96" text-anchor="middle" font-size="8" fill="#00D2DD">Garde-fous syst&#233;miques</text>

    <rect x="272" y="80" width="125" height="26" rx="4" fill="#263967"/>
    <text x="334" y="96" text-anchor="middle" font-size="8" fill="#B7BDCC">Outillage partag&#233;</text>

    <!-- Sub-labels under pillars -->
    <text x="79" y="120" text-anchor="middle" font-size="6.5" fill="#8691AB">r&#244;les, m&#233;tier, exemples</text>
    <text x="204" y="120" text-anchor="middle" font-size="6.5" fill="#00D2DD">s&#233;curit&#233;, marque, standards</text>
    <text x="334" y="120" text-anchor="middle" font-size="6.5" fill="#8691AB">MCP, CI/CD, evals</text>

    <!-- Arrows from platform down to factory -->
    <line x1="79" y1="130" x2="79" y2="148" stroke="#586586" stroke-width="1" marker-end="url(#arrowDown)"/>
    <line x1="204" y1="130" x2="204" y2="148" stroke="#586586" stroke-width="1" marker-end="url(#arrowDown)"/>
    <line x1="334" y1="130" x2="334" y2="148" stroke="#586586" stroke-width="1" marker-end="url(#arrowDown)"/>

    <!-- Factory (fed by platform) -->
    <rect x="10" y="155" width="400" height="80" rx="8" fill="#E7E9EE" stroke="#CFD3DD" stroke-width="1"/>
    <text x="25" y="173" font-size="10" font-weight="bold" fill="#0E2356">Usine des agents (aliment&#233;e)</text>

    <!-- Funnel (solid, no ?) -->
    <g transform="translate(60,205)">
      <path d="M-14,-14 L14,-14 L4,0 L4,10 L-4,10 L-4,0 Z" fill="none" stroke="#0E2356" stroke-width="1.5"/>
      <text x="0" y="-1" text-anchor="middle" font-size="10" fill="#0E2356" font-weight="bold">&#x2713;</text>
    </g>

    <!-- Arrow to Agent -->
    <line x1="82" y1="205" x2="112" y2="205" stroke="#0E2356" stroke-width="1" marker-end="url(#arrowNavy)"/>

    <!-- Agent planning pill -->
    <rect x="124" y="193" width="74" height="24" rx="12" fill="#0E2356"/>
    <text x="161" y="209" text-anchor="middle" font-size="8" fill="white">Agent plan.</text>

    <!-- Arrow -->
    <line x1="202" y1="205" x2="222" y2="205" stroke="#0E2356" stroke-width="1" marker-end="url(#arrowNavy)"/>

    <!-- Agent coding pill -->
    <rect x="234" y="193" width="64" height="24" rx="12" fill="#0E2356"/>
    <text x="266" y="209" text-anchor="middle" font-size="8" fill="white">Agent code</text>

    <!-- Arrow -->
    <line x1="302" y1="205" x2="322" y2="205" stroke="#0E2356" stroke-width="1" marker-end="url(#arrowNavy)"/>

    <!-- Tests -->
    <g transform="translate(350,205)">
      <polygon points="0,-14 22,0 0,14 -22,0" fill="white" stroke="#CFD3DD" stroke-width="1"/>
      <text x="0" y="3" text-anchor="middle" font-size="7" fill="#0E2356">Tests</text>
    </g>

    <!-- Guardrails bar &#x2014; solid -->
    <rect x="22" y="225" width="378" height="4" rx="2" fill="#00D2DD"/>

    <!-- ===== QUESTIONS ANSWERED ===== -->
    <text x="22" y="262" font-size="11" font-weight="bold" fill="#0E2356">R&#233;ponses syst&#233;miques :</text>

    <text x="28" y="284" font-size="10" fill="#0E2356">&#x2713;  Instructions d&#233;finies par la plateforme</text>
    <text x="28" y="304" font-size="10" fill="#0E2356">&#x2713;  Garde-fous appliqu&#233;s automatiquement</text>
    <text x="28" y="324" font-size="10" fill="#0E2356">&#x2713;  Standards et conventions partag&#233;s</text>
    <text x="28" y="344" font-size="10" fill="#0E2356">&#x2713;  Contexte m&#233;tier centralis&#233; et versionn&#233;</text>

    <!-- N projects, 1 platform -->
    <g transform="translate(10, 365)">
      <!-- Connected through platform bar -->
      <rect x="10" y="6" width="350" height="4" rx="2" fill="#0E2356"/>

      <rect x="10" y="16" width="80" height="22" rx="3" fill="white" stroke="#00D2DD" stroke-width="1.2"/>
      <text x="50" y="30" text-anchor="middle" font-size="7" fill="#0E2356">App A &#x2713;</text>

      <rect x="100" y="16" width="80" height="22" rx="3" fill="white" stroke="#00D2DD" stroke-width="1.2"/>
      <text x="140" y="30" text-anchor="middle" font-size="7" fill="#0E2356">App B &#x2713;</text>

      <rect x="190" y="16" width="80" height="22" rx="3" fill="white" stroke="#00D2DD" stroke-width="1.2"/>
      <text x="230" y="30" text-anchor="middle" font-size="7" fill="#0E2356">App C &#x2713;</text>

      <rect x="280" y="16" width="80" height="22" rx="3" fill="white" stroke="#00D2DD" stroke-width="1.2"/>
      <text x="320" y="30" text-anchor="middle" font-size="7" fill="#0E2356">App N &#x2713;</text>
    </g>

    <text x="100" y="412" font-size="8" fill="#8691AB" font-style="italic">Toutes connect&#233;es &#224; la m&#234;me plateforme</text>

    <!-- Confidence badge -->
    <rect x="10" y="425" width="100" height="24" rx="4" fill="#0E2356"/>
    <text x="60" y="441" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Confiance</text>
    <text x="120" y="437" font-size="9" fill="#586586" font-style="italic">D&#233;fini une fois, appliqu&#233; partout.</text>
    <text x="120" y="451" font-size="9" fill="#0E2356" font-weight="bold" font-style="italic">Coh&#233;rence par construction.</text>
  </g>

  <!-- ===== BOTTOM ANNOTATION ===== -->
  <text x="450" y="525" text-anchor="middle" font-size="11" font-weight="600" fill="#263967">L'usine est n&#233;cessaire. Mais sans plateforme, chaque projet r&#233;invente le contexte, les garde-fous, l'outillage.</text>
  <text x="450" y="543" text-anchor="middle" font-size="11" font-weight="600" fill="#263967">La plateforme transforme l'artisanat r&#233;p&#233;t&#233; en ing&#233;nierie industrielle.</text>

</svg>