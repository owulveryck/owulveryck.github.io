<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"  viewBox="0 0 480 170">

      <!-- ===== PANEL 1 : Monolithe (réduit) ===== -->
      <!-- Encadré "application monolithique" -->
      <rect x="8" y="5" width="95" height="95" rx="4" fill="rgba(14,35,86,0.06)" stroke="#0E2356" stroke-width="2.5"/>
      <text x="55" y="15" text-anchor="middle" fill="#0E2356" font-size="5" font-weight="600" opacity="0.7">Application monolithique</text>
      <!-- Orchestrateur dans le monolithe -->
      <rect x="25" y="20" width="60" height="14" rx="4" fill="#0E2356"/>
      <text x="55" y="30" text-anchor="middle" fill="white" font-size="6" font-weight="600">Orch.</text>
      <line x1="55" y1="34" x2="55" y2="44" stroke="#0E2356" stroke-width="2"/>
      <polygon points="52,42 55,48 58,42" fill="#0E2356"/>
      <!-- Agent dans le monolithe -->
      <polygon points="41,54 55,46 69,54 69,70 55,78 41,70" fill="#00D2DD"/>
      <text x="55" y="66" text-anchor="middle" fill="#0E2356" font-size="8" font-weight="700">Agent</text>
      <!-- Labels -->
      <text x="55" y="115" text-anchor="middle" fill="#0E2356" font-size="8.5" font-weight="700">Monolithe</text>
      <text x="55" y="127" text-anchor="middle" fill="#3E4F78" font-size="6.5">Dans le monolithe</text>
      <text x="55" y="137" text-anchor="middle" fill="#3E4F78" font-size="6.5">avec l'orchestrateur</text>
      <text x="55" y="151" text-anchor="middle" fill="#0E2356" font-size="7" font-weight="600">Couplé · Synchrone</text>

      <!-- Arrow 1→2 : découplage -->
      <line x1="110" y1="55" x2="138" y2="55" stroke="#0E2356" stroke-width="2" opacity="0.3"/>
      <polygon points="136,52 142,55 136,58" fill="#0E2356" opacity="0.3"/>
      <text x="124" y="48" text-anchor="middle" fill="#3E4F78" font-size="5.5" font-style="italic">découplage</text>

      <!-- ===== PANEL 2 : Couplage fort (taille moyenne) ===== -->
      <!-- Orchestrateur externe (au-dessus du panel) -->
      <rect x="170" y="0" width="50" height="12" rx="4" fill="#0E2356" opacity="0.7"/>
      <text x="195" y="9" text-anchor="middle" fill="white" font-size="6" font-weight="600">Orch.</text>
      <line x1="195" y1="12" x2="195" y2="19" stroke="#0E2356" stroke-width="1.5" opacity="0.5"/>
      <!-- Badge API -->
      <rect x="181" y="19" width="28" height="11" rx="3" fill="#6E7B9A"/>
      <text x="195" y="27" text-anchor="middle" fill="white" font-size="6" font-weight="600">API</text>
      <line x1="195" y1="30" x2="195" y2="42" stroke="#6E7B9A" stroke-width="1.5" opacity="0.5"/>
      <polygon points="192,40 195,46 198,40" fill="#6E7B9A" opacity="0.5"/>
      <!-- Encadré agent -->
      <rect x="145" y="35" width="100" height="65" rx="6" fill="rgba(14,35,86,0.03)" stroke="#0E2356" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
      <!-- Agent -->
      <polygon points="181,54 195,46 209,54 209,70 195,78 181,70" fill="#00D2DD"/>
      <text x="195" y="66" text-anchor="middle" fill="#0E2356" font-size="8" font-weight="700">Agent</text>
      <text x="195" y="92" text-anchor="middle" fill="#3E4F78" font-size="5.5">l'agent est utile</text>
      <!-- Labels -->
      <text x="195" y="115" text-anchor="middle" fill="#0E2356" font-size="8.5" font-weight="700">Agent exposé</text>
      <text x="195" y="127" text-anchor="middle" fill="#3E4F78" font-size="6.5">Appel couplé via API</text>
      <text x="195" y="137" text-anchor="middle" fill="#3E4F78" font-size="6.5">l'agent est utile</text>
      <text x="195" y="151" text-anchor="middle" fill="#0E2356" font-size="6" font-weight="600">Prend en compte le contexte métier</text>

      <!-- Arrow 2→3 : autonomisation -->
      <line x1="252" y1="55" x2="280" y2="55" stroke="#0E2356" stroke-width="2" opacity="0.3"/>
      <polygon points="278,52 284,55 278,58" fill="#0E2356" opacity="0.3"/>
      <text x="266" y="48" text-anchor="middle" fill="#3E4F78" font-size="5.5" font-style="italic">autonomisation</text>

      <!-- ===== PANEL 3 : Agent-produit (agrandi, multi-domaines) ===== -->

      <!-- Domaine B (central, contient l'agent-produit) -->
      <rect x="330" y="28" width="68" height="56" rx="6" fill="rgba(0,210,221,0.08)" stroke="#0E2356" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.5"/>
      <text x="364" y="37" text-anchor="middle" fill="#0E2356" font-size="5.5" font-weight="700">Dom. B</text>
      <polygon points="350,52 364,44 378,52 378,68 364,76 350,68" fill="#00D2DD"/>
      <text x="364" y="64" text-anchor="middle" fill="#0E2356" font-size="7" font-weight="700">Agent</text>

      <!-- Domaine A (en haut à gauche, contient l'orchestrateur) -->
      <rect x="288" y="0" width="56" height="24" rx="4" fill="rgba(14,35,86,0.06)" stroke="#0E2356" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
      <text x="316" y="9" text-anchor="middle" fill="#0E2356" font-size="5" font-weight="700">Dom. A</text>
      <rect x="298" y="12" width="36" height="10" rx="3" fill="#0E2356" opacity="0.7"/>
      <text x="316" y="20" text-anchor="middle" fill="white" font-size="5.5" font-weight="600">Orch.</text>
      <!-- Connexion Orch → Agent -->
      <line x1="320" y1="24" x2="356" y2="50" stroke="#0E2356" stroke-width="1.5" opacity="0.3"/>

      <!-- Domaine C (en haut à droite, contient un agent) -->
      <rect x="410" y="0" width="52" height="24" rx="4" fill="rgba(14,35,86,0.06)" stroke="#0E2356" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
      <text x="436" y="9" text-anchor="middle" fill="#0E2356" font-size="5" font-weight="700">Dom. C</text>
      <polygon points="426,13 433,10 440,13 440,21 433,24 426,21" fill="#00D2DD" opacity="0.6"/>
      <!-- Connexion Agent C → Agent -->
      <line x1="426" y1="18" x2="380" y2="54" stroke="#00D2DD" stroke-width="1.5" opacity="0.3"/>

      <!-- Domaine D (à droite, contient un agent) -->
      <rect x="410" y="44" width="52" height="24" rx="4" fill="rgba(14,35,86,0.06)" stroke="#0E2356" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
      <text x="436" y="53" text-anchor="middle" fill="#0E2356" font-size="5" font-weight="700">Dom. D</text>
      <polygon points="426,57 433,54 440,57 440,65 433,68 426,65" fill="#00D2DD" opacity="0.6"/>
      <!-- Connexion Agent D → Agent -->
      <line x1="426" y1="61" x2="380" y2="62" stroke="#00D2DD" stroke-width="1.5" opacity="0.3"/>

      <!-- Badges protocoles sous le domaine B -->
      <rect x="335" y="82" width="24" height="9" rx="3" fill="#00D2DD" opacity="0.6"/>
      <text x="347" y="89" text-anchor="middle" fill="#0E2356" font-size="5" font-weight="700">A2A</text>
      <rect x="364" y="82" width="24" height="9" rx="3" fill="#00D2DD" opacity="0.6"/>
      <text x="376" y="89" text-anchor="middle" fill="#0E2356" font-size="5" font-weight="700">MCP</text>

      <text x="364" y="100" text-anchor="middle" fill="#3E4F78" font-size="5.5">ownership dans ce domaine</text>

      <!-- Labels -->
      <text x="364" y="115" text-anchor="middle" fill="#0E2356" font-size="8.5" font-weight="700">Agent-produit</text>
      <text x="364" y="127" text-anchor="middle" fill="#3E4F78" font-size="6.5">Pensé comme un produit</text>
      <text x="364" y="137" text-anchor="middle" fill="#3E4F78" font-size="6.5">ownership dans un autre domaine</text>
      <text x="364" y="151" text-anchor="middle" fill="#0E2356" font-size="6" font-weight="600">Stratégie · Product management</text>
    </svg>