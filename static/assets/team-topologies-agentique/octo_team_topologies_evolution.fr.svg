<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" font-family="'Outfit', sans-serif" style="font-variant-ligatures: none;" text-rendering="geometricPrecision">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="timeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E2356"/>
      <stop offset="100%" stop-color="#00D2DD"/>
    </linearGradient>
    <marker id="aGreen" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 5 2, 0 4" fill="#34A853"/>
    </marker>
    <marker id="aPurple" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 5 2, 0 4" fill="#7B61FF"/>
    </marker>
    <marker id="aPurpleR" markerWidth="5" markerHeight="4" refX="0" refY="2" orient="auto">
      <polygon points="5 0, 0 2, 5 4" fill="#7B61FF"/>
    </marker>
    <marker id="aGray" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 5 2, 0 4" fill="#8691AB"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="920" height="440" rx="12" fill="#ffffff" stroke="#CFD3DD" stroke-width="1" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#0E2356">L'&#233;volution des modes d'interaction</text>
  <text x="460" y="44" text-anchor="middle" font-size="10" fill="#586586" font-style="italic">Les m&#234;mes &#233;quipes, trois moments diff&#233;rents</text>

  <!-- Timeline -->
  <rect x="80" y="58" width="780" height="4" rx="2" fill="url(#timeGrad)"/>
  <polygon points="862,60 855,55 855,65" fill="#00D2DD"/>
  <line x1="350" y1="53" x2="350" y2="67" stroke="#8691AB" stroke-width="1"/>
  <line x1="620" y1="53" x2="620" y2="67" stroke="#8691AB" stroke-width="1"/>

  <!-- Phase labels -->
  <text x="210" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#0E2356">D&#233;marrage</text>
  <text x="485" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#0E2356">Maturation</text>
  <text x="750" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#0E2356">Autonomie</text>

  <!-- Row labels (left side) -->
  <text x="16" y="140" font-size="9" font-weight="bold" fill="#34A853">Facilitating</text>
  <text x="16" y="230" font-size="9" font-weight="bold" fill="#7B61FF">Collaboration</text>
  <text x="16" y="325" font-size="9" font-weight="bold" fill="#8691AB">X-as-a-Service</text>

  <!-- Row separators -->
  <line x1="80" y1="180" x2="870" y2="180" stroke="#E7E9EE" stroke-width="0.5"/>
  <line x1="80" y1="275" x2="870" y2="275" stroke="#E7E9EE" stroke-width="0.5"/>

  <!-- Column separators -->
  <line x1="350" y1="92" x2="350" y2="365" stroke="#E7E9EE" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="620" y1="92" x2="620" y2="365" stroke="#E7E9EE" stroke-width="0.5" stroke-dasharray="4,4"/>


  <!-- ================================================================ -->
  <!-- ===== ROW 1: FACILITATING ===== -->
  <!-- ================================================================ -->

  <!-- Phase 1: strong -->
  <rect x="100" y="110" width="55" height="20" rx="4" fill="#DFBDCF" stroke="#D09CB7" stroke-width="1"/>
  <text x="127" y="124" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">Enabling</text>
  <line x1="160" y1="120" x2="228" y2="120" stroke="#34A853" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#aGreen)"/>
  <rect x="235" y="110" width="55" height="20" rx="4" fill="#FFEDB8" stroke="#FFD966" stroke-width="1"/>
  <text x="262" y="124" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">Produit</text>
  <text x="165" y="150" font-size="8" fill="#2D7D24">Formation, shift-left,</text>
  <text x="165" y="161" font-size="8" fill="#2D7D24">config. orchestrateur</text>

  <!-- Phase 2: fading -->
  <rect x="375" y="110" width="55" height="20" rx="4" fill="#DFBDCF" stroke="#D09CB7" stroke-width="1" opacity="0.5"/>
  <text x="402" y="124" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356" opacity="0.6">Enabling</text>
  <line x1="435" y1="120" x2="498" y2="120" stroke="#34A853" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4" marker-end="url(#aGreen)"/>
  <rect x="505" y="110" width="55" height="20" rx="4" fill="#FFEDB8" stroke="#FFD966" stroke-width="1"/>
  <text x="532" y="124" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">Produit</text>
  <text x="405" y="150" font-size="9" fill="#2D7D24" font-weight="600">Support cibl&#233;</text>
  <text x="405" y="163" font-size="8" fill="#586586">Produit monte en comp&#233;tence</text>

  <!-- Phase 3: gone -->
  <rect x="645" y="110" width="55" height="20" rx="4" fill="none" stroke="#D09CB7" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="672" y="124" text-anchor="middle" font-size="8" fill="#D09CB7" opacity="0.4" font-style="italic">&#8709;</text>
  <rect x="775" y="110" width="55" height="20" rx="4" fill="#FFEDB8" stroke="#FFD966" stroke-width="1"/>
  <text x="802" y="124" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">Produit</text>
  <text x="710" y="126" text-anchor="middle" font-size="8" fill="#586586" font-style="italic">autonome</text>


  <!-- ================================================================ -->
  <!-- ===== ROW 2: COLLABORATION ===== -->
  <!-- ================================================================ -->

  <!-- Phase 1: strong, bidirectional -->
  <rect x="100" y="200" width="35" height="20" rx="4" fill="#FFC08B" stroke="#E88814" stroke-width="1"/>
  <text x="117" y="214" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">CS</text>
  <line x1="140" y1="210" x2="223" y2="210" stroke="#7B61FF" stroke-width="3" stroke-dasharray="6,4" marker-start="url(#aPurpleR)" marker-end="url(#aPurple)"/>
  <rect x="230" y="200" width="70" height="20" rx="4" fill="#B7CDF1" stroke="#6D9EEB" stroke-width="1"/>
  <text x="265" y="214" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">Plateforme</text>
  <text x="153" y="243" font-size="8" fill="#5B3EA7">Co-construction</text>
  <text x="153" y="254" font-size="8" fill="#5B3EA7">expertise IA</text>

  <!-- Phase 2: transitioning -->
  <rect x="375" y="200" width="35" height="20" rx="4" fill="#FFC08B" stroke="#E88814" stroke-width="1" opacity="0.6"/>
  <text x="392" y="214" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356" opacity="0.7">CS</text>
  <line x1="415" y1="210" x2="488" y2="210" stroke="#7B61FF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4" marker-end="url(#aPurple)"/>
  <rect x="495" y="200" width="70" height="20" rx="4" fill="#B7CDF1" stroke="#6D9EEB" stroke-width="1"/>
  <text x="530" y="214" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">Plateforme</text>
  <text x="415" y="243" font-size="9" fill="#5B3EA7" font-weight="600">&#8594; XaaS</text>
  <text x="415" y="256" font-size="8" fill="#586586">Plateforme encapsule</text>
  <text x="415" y="267" font-size="8" fill="#586586">les capacit&#233;s du CS</text>

  <!-- Phase 3: collaboration terminée -->
  <rect x="670" y="200" width="35" height="20" rx="4" fill="none" stroke="#E88814" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <rect x="755" y="200" width="70" height="20" rx="4" fill="none" stroke="#6D9EEB" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="730" y="214" text-anchor="middle" font-size="8" fill="#586586" font-style="italic">termin&#233;e</text>


  <!-- ================================================================ -->
  <!-- ===== ROW 3: X-AS-A-SERVICE ===== -->
  <!-- ================================================================ -->

  <!-- Phase 1: thin -->
  <rect x="100" y="295" width="70" height="20" rx="4" fill="#B7CDF1" stroke="#6D9EEB" stroke-width="1"/>
  <text x="135" y="309" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">Plateforme</text>
  <line x1="175" y1="305" x2="228" y2="305" stroke="#8691AB" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4" marker-end="url(#aGray)"/>
  <rect x="235" y="295" width="55" height="20" rx="4" fill="#FFEDB8" stroke="#FFD966" stroke-width="1"/>
  <text x="262" y="309" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">Produit</text>
  <text x="175" y="335" font-size="8" fill="#586586">Capacit&#233;s de base</text>

  <!-- Phase 2: growing — Produit consomme la Plateforme -->
  <rect x="375" y="295" width="55" height="20" rx="4" fill="#FFEDB8" stroke="#FFD966" stroke-width="1"/>
  <text x="402" y="309" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">Produit</text>
  <line x1="435" y1="305" x2="498" y2="305" stroke="#8691AB" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#aGray)"/>
  <rect x="505" y="295" width="70" height="20" rx="4" fill="#B7CDF1" stroke="#6D9EEB" stroke-width="1"/>
  <text x="540" y="309" text-anchor="middle" font-size="8" font-weight="600" fill="#0E2356">Plateforme</text>
  <text x="405" y="335" font-size="9" fill="#263967" font-weight="600">Self-service partiel</text>
  <text x="405" y="348" font-size="8" fill="#586586">Garde-fous automatis&#233;s</text>

  <!-- Phase 3: dominant — Produit consomme la Plateforme -->
  <rect x="645" y="290" width="65" height="28" rx="4" fill="#FFEDB8" stroke="#FFD966" stroke-width="2"/>
  <text x="677" y="308" text-anchor="middle" font-size="9" font-weight="bold" fill="#0E2356">Produit</text>
  <line x1="715" y1="304" x2="768" y2="304" stroke="#8691AB" stroke-width="4" stroke-dasharray="6,4" marker-end="url(#aGray)"/>
  <rect x="775" y="290" width="80" height="28" rx="4" fill="#B7CDF1" stroke="#6D9EEB" stroke-width="2"/>
  <text x="815" y="308" text-anchor="middle" font-size="9" font-weight="bold" fill="#0E2356">Plateforme</text>
  <text x="695" y="340" font-size="10" fill="#263967" font-weight="bold">Self-service complet</text>
  <text x="695" y="355" font-size="8" fill="#586586">Contexte, garde-fous, skills</text>


  <!-- ===== CALLOUT ===== -->
  <rect x="220" y="380" width="480" height="28" rx="6" fill="#EBFAFB" stroke="#00D2DD" stroke-width="1.2"/>
  <text x="460" y="399" text-anchor="middle" font-size="10" fill="#0E2356" font-weight="bold">L'enabling dispara&#238;t parce qu'il r&#233;ussit &#8212; pas parce qu'il &#233;choue.</text>

  <!-- Legend -->
  <line x1="180" y1="425" x2="200" y2="425" stroke="#34A853" stroke-width="2.5" stroke-dasharray="4,3"/>
  <text x="206" y="429" font-size="8" fill="#586586">Facilitating</text>
  <line x1="300" y1="425" x2="320" y2="425" stroke="#7B61FF" stroke-width="2.5" stroke-dasharray="4,3"/>
  <text x="326" y="429" font-size="8" fill="#586586">Collaboration</text>
  <line x1="430" y1="425" x2="450" y2="425" stroke="#8691AB" stroke-width="2.5" stroke-dasharray="4,3"/>
  <text x="456" y="429" font-size="8" fill="#586586">X-as-a-Service</text>
  <rect x="570" y="420" width="12" height="8" rx="2" fill="#FFEDB8" stroke="#FFD966" stroke-width="0.5"/>
  <text x="588" y="428" font-size="8" fill="#586586">Produit</text>
  <rect x="640" y="420" width="12" height="8" rx="2" fill="#B7CDF1" stroke="#6D9EEB" stroke-width="0.5"/>
  <text x="658" y="428" font-size="8" fill="#586586">Plateforme</text>
  <rect x="720" y="420" width="12" height="8" rx="2" fill="#DFBDCF" stroke="#D09CB7" stroke-width="0.5"/>
  <text x="738" y="428" font-size="8" fill="#586586">Enabling</text>
  <rect x="790" y="420" width="12" height="8" rx="2" fill="#FFC08B" stroke="#E88814" stroke-width="0.5"/>
  <text x="808" y="428" font-size="8" fill="#586586">CS</text>

</svg>
