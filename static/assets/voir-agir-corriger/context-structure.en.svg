<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="stable-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="volatile-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8f9fc" rx="6"/>

  <!-- ==================== LEFT: POORLY STRUCTURED ==================== -->
  <text x="220" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828">&#x2717; Poorly structured</text>
  <text x="220" y="50" text-anchor="middle" font-size="11" fill="#888">(volatile mixed with stable)</text>

  <!-- Row 1: volatile -->
  <rect x="30" y="65" width="380" height="55" rx="5" fill="#FFEBEE" stroke="#E53935" stroke-width="1.2"/>
  <text x="45" y="88" font-size="12" font-weight="bold" fill="#C62828">Today's CI result</text>
  <text x="45" y="105" font-size="10" fill="#888">changes every run</text>
  <rect x="320" y="75" width="80" height="36" rx="4" fill="#FFCDD2"/>
  <text x="360" y="98" text-anchor="middle" font-size="9" font-weight="bold" fill="#C62828">&#x26a0; invalidates &#x2193;</text>

  <!-- Row 2: stable (bad position) -->
  <rect x="30" y="130" width="380" height="55" rx="5" fill="#E8F5E9" stroke="#81C784" stroke-width="1.2"/>
  <text x="45" y="153" font-size="12" font-weight="bold" fill="#2E7D32">Coding conventions</text>
  <text x="45" y="170" font-size="10" fill="#888">stable</text>
  <rect x="320" y="140" width="80" height="36" rx="4" fill="#FFCDD2"/>
  <text x="360" y="163" text-anchor="middle" font-size="9" font-weight="bold" fill="#C62828">recomputed</text>

  <!-- Row 3: volatile -->
  <rect x="30" y="195" width="380" height="55" rx="5" fill="#FFEBEE" stroke="#E53935" stroke-width="1.2"/>
  <text x="45" y="218" font-size="12" font-weight="bold" fill="#C62828">File being edited</text>
  <text x="45" y="235" font-size="10" fill="#888">changes every task</text>
  <rect x="320" y="205" width="80" height="36" rx="4" fill="#FFCDD2"/>
  <text x="360" y="228" text-anchor="middle" font-size="9" font-weight="bold" fill="#C62828">&#x26a0; invalidates &#x2193;</text>

  <!-- Row 4: stable (bad position) -->
  <rect x="30" y="260" width="380" height="55" rx="5" fill="#E8F5E9" stroke="#81C784" stroke-width="1.2"/>
  <text x="45" y="283" font-size="12" font-weight="bold" fill="#2E7D32">Project architecture</text>
  <text x="45" y="300" font-size="10" fill="#888">stable</text>
  <rect x="320" y="270" width="80" height="36" rx="4" fill="#FFCDD2"/>
  <text x="360" y="293" text-anchor="middle" font-size="9" font-weight="bold" fill="#C62828">recomputed</text>

  <!-- Row 5: task -->
  <rect x="30" y="325" width="380" height="55" rx="5" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.2"/>
  <text x="45" y="348" font-size="12" font-weight="bold" fill="#E65100">Task instructions</text>
  <text x="45" y="365" font-size="10" fill="#888">semi-stable</text>

  <!-- Left verdict -->
  <rect x="30" y="400" width="380" height="45" rx="6" fill="#FFCDD2"/>
  <text x="220" y="428" text-anchor="middle" font-size="12" font-weight="bold" fill="#C62828">Nearly the entire context recomputed every turn</text>

  <!-- Invalidation arrows left -->
  <line x1="360" y1="111" x2="360" y2="130" stroke="#E53935" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="360" y1="176" x2="360" y2="195" stroke="#E53935" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="360" y1="241" x2="360" y2="260" stroke="#E53935" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="360" y1="306" x2="360" y2="325" stroke="#E53935" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- ==================== RIGHT: WELL STRUCTURED ==================== -->
  <text x="680" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#2E7D32">&#x2713; Well structured</text>
  <text x="680" y="50" text-anchor="middle" font-size="11" fill="#888">(stable on top, volatile at bottom)</text>

  <!-- Row 1: stable -->
  <rect x="490" y="65" width="380" height="55" rx="5" fill="#E8F5E9" stroke="#81C784" stroke-width="1.2"/>
  <text x="505" y="88" font-size="12" font-weight="bold" fill="#2E7D32">Coding conventions</text>
  <text x="505" y="105" font-size="10" fill="#888">stable</text>
  <rect x="780" y="75" width="80" height="36" rx="4" fill="#C8E6C9"/>
  <text x="820" y="98" text-anchor="middle" font-size="9" font-weight="bold" fill="#2E7D32">&#x2713; cached</text>

  <!-- Row 2: stable -->
  <rect x="490" y="130" width="380" height="55" rx="5" fill="#E8F5E9" stroke="#81C784" stroke-width="1.2"/>
  <text x="505" y="153" font-size="12" font-weight="bold" fill="#2E7D32">Project architecture</text>
  <text x="505" y="170" font-size="10" fill="#888">stable</text>
  <rect x="780" y="140" width="80" height="36" rx="4" fill="#C8E6C9"/>
  <text x="820" y="163" text-anchor="middle" font-size="9" font-weight="bold" fill="#2E7D32">&#x2713; cached</text>

  <!-- Row 3: semi-stable -->
  <rect x="490" y="195" width="380" height="55" rx="5" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1.2"/>
  <text x="505" y="218" font-size="12" font-weight="bold" fill="#E65100">Task instructions</text>
  <text x="505" y="235" font-size="10" fill="#888">semi-stable</text>

  <!-- Separation line: cache boundary -->
  <line x1="490" y1="257" x2="870" y2="257" stroke="#2E7D32" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="680" y="275" text-anchor="middle" font-size="10" font-style="italic" fill="#2E7D32">&#x2193; only this zone is recomputed</text>

  <!-- Row 4: volatile -->
  <rect x="490" y="285" width="380" height="55" rx="5" fill="#FFEBEE" stroke="#E53935" stroke-width="1.2"/>
  <text x="505" y="308" font-size="12" font-weight="bold" fill="#C62828">File being edited</text>
  <text x="505" y="325" font-size="10" fill="#888">volatile</text>

  <!-- Row 5: volatile -->
  <rect x="490" y="350" width="380" height="55" rx="5" fill="#FFEBEE" stroke="#E53935" stroke-width="1.2"/>
  <text x="505" y="373" font-size="12" font-weight="bold" fill="#C62828">Today's CI result</text>
  <text x="505" y="390" font-size="10" fill="#888">volatile</text>

  <!-- Right verdict -->
  <rect x="490" y="425" width="380" height="45" rx="6" fill="#C8E6C9"/>
  <text x="680" y="453" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Only the bottom section is recomputed</text>

  <!-- Center separator -->
  <line x1="450" y1="60" x2="450" y2="470" stroke="#c5c9d4" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="450" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b2547">vs</text>
</svg>
